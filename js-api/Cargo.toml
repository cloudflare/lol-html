[package]
name = "lol-html-js-api"
version = "0.1.0"
authors = ["Ivan Nikulin <inikulin@cloudflare.com>"]
edition = "2018"

[dependencies]
js-sys = "0.3.51"
lol_html = { path = "../" }
serde = { version = "1.0.126", features = ["derive"] }
serde-wasm-bindgen = "0.3.0"
wasm-bindgen = "0.2.74"
thiserror = "1.0.26"
encoding_rs = "0.8.13"

[lib]
crate-type = ["cdylib", "rlib"]
